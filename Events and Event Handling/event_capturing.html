<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demonstration of Event Capturing</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Artifakt Element";
        font-weight: 600;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #222;
      }
      #a {
        width: 40%;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ff595e;
      }
      #b {
        width: 70%;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1982c4;
      }
      #c {
        width: 70%;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #8ac926;
      }
      #btn {
        background: #6a4c93;
        border-radius: 0.25rem;
        border: 0;
        color: hsl(265, 32%, 94%);
        cursor: pointer;
        font-weight: 700;
        padding: 0.5rem 1.5rem;
        transition: all 0.3s ease-in-out;
      }
      #btn:hover {
        background: hsl(265, 32%, 34%);
      }
    </style>
  </head>
  <body>
    <div id="a">
      <div id="b">
        <div id="c"><button id="btn">Click Me</button></div>
      </div>
    </div>

    <script>
      /* 
         ১. এলিমেন্ট সিলেকশন:
         document.querySelector ব্যবহার করে ID (#a, #b, #c এবং #btn) এর মাধ্যমে 
         প্যারেন্ট থেকে চাইল্ড পর্যন্ত সব এলিমেন্টকে সিলেক্ট করা হয়েছে।
      */
      let btn = document.querySelector("#btn");
      let a = document.querySelector("#a");
      let b = document.querySelector("#b");
      let c = document.querySelector("#c");

      /* 
         ২. বাটন ইভেন্ট (Target Phase):
         এটি আমাদের মূল টার্গেট এলিমেন্ট। এখানে কোনো থার্ড প্যারামিটার (true/false) দেওয়া হয়নি, 
         তাই এটি ডিফল্টভাবে বাবলিং ফেজে কাজ করবে।
      */
      btn.addEventListener("click", () => {
        console.log("Button Clicked"); // Output: Button Clicked
      });

      /* 
         ৩. ইভেন্ট ক্যাপচারিং (Capturing Phase - true):
         addEventListener-এর তৃতীয় প্যারামিটার হিসেবে 'true' ব্যবহার করা হয়েছে। এর মানে হলো, ইভেন্টটি যখন উপর (Window) থেকে নিচের দিকে (Target) নামবে, তখনই এটি ট্রিগার হবে। বাবলিং হওয়ার আগেই এটি রান করবে।
      */
      a.addEventListener(
        "click",
        () => {
          console.log("a Clicked"); // Output: a Clicked
        },
        true, // 'true' মানে এটি ক্যাপচারিং ফেজে কাজ করবে
      );

      /* 
         ৪. ইভেন্ট বাবলিং (Bubbling Phase - false/default):
         এখানে কোনো থার্ড প্যারামিটার দেওয়া হয়নি (যা ডিফল্টভাবে false)। 
         তাই এটি বাবলিং ফেজে কাজ করবে, অর্থাৎ টার্গেট এলিমেন্টে ক্লিক হওয়ার পর ইভেন্ট যখন নিচ থেকে উপরে উঠবে তখন এটি রান করবে।
      */
      b.addEventListener("click", () => {
        console.log("b Clicked"); // Output: b Clicked
      });

      /* 
         ৫. ইভেন্ট ক্যাপচারিং (Capturing Phase - true):
         এটিও ক্যাপচারিং মোডে আছে। ফলে 'a' এর পর এবং 'btn' এ পৌঁছানোর আগে এটি রান করবে।
      */
      c.addEventListener(
        "click",
        () => {
          console.log("c Clicked"); // Output: c Clicked
        },
        true, // ক্যাপচারিং এনাবল করা হয়েছে
      );

      /* 
         ---------------------------------------------------------
         গুরুত্বপূর্ণ তথ্য ও Study Notes (Event Capturing):
         ---------------------------------------------------------
         
         ১. ইভেন্ট প্রপাগেশন (Event Propagation) এর ৩টি ধাপ:
            - Capturing Phase: ইভেন্ট Window থেকে শুরু করে টার্গেট এলিমেন্ট পর্যন্ত নিচে নামে।
            - Target Phase: ইভেন্টটি সরাসরি টার্গেট এলিমেন্টে পৌঁছায়।
            - Bubbling Phase: ইভেন্টটি টার্গেট থেকে আবার উপরের দিকে (Window পর্যন্ত) উঠতে থাকে।

         ২. ক্যাপচারিং কেন ব্যবহার করবেন?
            - যদি আপনি চান কোনো চাইল্ড এলিমেন্টের ইভেন্ট রান হওয়ার আগেই প্যারেন্ট সেই ইভেন্টটিকে ইন্টারসেপ্ট (Intercept) বা আটকে দিক, তখন ক্যাপচারিং ব্যবহার করা হয়।

         ৩. Expected Output Flow (যদি বাটনে ক্লিক করা হয়):
            ১. a Clicked (Capturing - যেহেতু true দেওয়া আছে)
            ২. c Clicked (Capturing - যেহেতু true দেওয়া আছে)
            ৩. Button Clicked (Target Phase)
            ৪. b Clicked (Bubbling - যেহেতু ডিফল্ট false থাকে)
            *লক্ষ্য করুন: 'b' সবার শেষে আসছে কারণ সেটি বাবলিং ফেজে আছে।*

         ৪. Common Mistakes (সাধারণ ভুল):
            - সব জায়গায় 'true' ব্যবহার করা। এতে ইভেন্টের স্বাভাবিক ফ্লো (Bubbling) নষ্ট হতে পারে।
            - ক্যাপচারিং এবং বাবলিং এর পার্থক্য না বুঝে কমপ্লেক্স নেস্টেড লেআউটে ইভেন্ট হ্যান্ডল করা।

         ৫. Best Practices (সেরা নিয়ম):
            - ৯৫% ক্ষেত্রে আমরা বাবলিং (ডিফল্ট) ব্যবহার করি। বিশেষ প্রয়োজন ছাড়া ক্যাপচারিং (true) ব্যবহার না করাই ভালো।
            - যদি ইভেন্ট প্রপাগেশন বন্ধ করতে চান, তবে e.stopPropagation() ব্যবহার করুন।

         ৬. Thumb-up Rules:
            - addEventListener(event, function, useCapture);
            - useCapture = true -> Capturing (Top to Bottom)
            - useCapture = false -> Bubbling (Bottom to Top)
      */
    </script>
  </body>
</html>
