<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Artifakt Element";
        font-weight: 600;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #222;
      }
      h1 {
        color: #555;
        font-size: 5rem;
        font-weight: bold;
      }
      input {
        width: 25rem;
        height: auto;
        padding: 0.5rem;
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <input type="text" name="" id="" placeholder="Write anything" />
    <h1>Total Characters: <span>0</span> character</h1>
    <script>
      /* 
         ১. এলিমেন্ট সিলেকশন (Element Selection):
         document.querySelector ব্যবহার করে HTML-এর <input> এবং <span> এলিমেন্ট দুটিকে 
         জাভাস্ক্রিপ্ট ভেরিয়েবলে (inp এবং span) স্টোর করা হয়েছে। 
         যাতে পরবর্তীতে এগুলোর ভ্যালু পড়া এবং পরিবর্তন করা সহজ হয়।
      */
      let inp = document.querySelector("input");
      let span = document.querySelector("span");

      /* 
         ২. 'input' ইভেন্ট লিসেনার:
         ইনপুট ফিল্ডে যখনই কোনো ক্যারেক্টার টাইপ করা হয়, মুছে ফেলা হয় বা পেস্ট করা হয়, 
         তখনই 'input' ইভেন্টটি রিয়েল-টাইমে ট্রিগার হয়। 
         এটি 'change' ইভেন্টের চেয়ে বেশি কার্যকর কারণ এটি প্রতিটি কি-স্ট্রোকের সাথে সাথে কাজ করে।
      */
      inp.addEventListener("input", function () {
        /* 
           ৩. ক্যারেক্টার কাউন্ট লজিক:
           inp.value: ইনপুট বক্সে বর্তমানে যা লেখা আছে তা সংগ্রহ করে।
           .length: সেই লেখার মোট দৈর্ঘ্য বা ক্যারেক্টার সংখ্যা বের করে।
           span.textContent: প্রাপ্ত সংখ্যাটি <span> ট্যাগের ভেতরে বসিয়ে দেয়।
        */
        span.textContent = inp.value.length; // Output: ইনপুটের ক্যারেক্টার সংখ্যা (যেমন: 5, 10, 25)
      });

      /* 
         ---------------------------------------------------------
         গুরুত্বপূর্ণ তথ্য ও Study Notes (Character Counter):
         ---------------------------------------------------------
         
         ১. কেন 'input' ইভেন্ট ব্যবহার করা হয়েছে?
            - 'keydown' বা 'keyup' ইভেন্ট অনেক সময় মাউস দিয়ে টেক্সট পেস্ট করলে কাজ করে না। 
            - 'input' ইভেন্ট কিবোর্ড টাইপিং, কপি-পেস্ট বা ড্র্যাগ-অ্যান্ড-ড্রপ—সব ক্ষেত্রেই কাজ করে।

         ২. Common Mistakes (সাধারণ ভুল):
            - span.value ব্যবহার করা: মনে রাখতে হবে <span> কোনো ইনপুট এলিমেন্ট নয়, তাই এর কন্টেন্ট পরিবর্তনের জন্য textContent বা innerText ব্যবহার করতে হয়।
            - inp.length লেখা: সরাসরি এলিমেন্টের ওপর .length কাজ করে না, 
              এলিমেন্টের ভ্যালুর ওপর (inp.value.length) এটি কাজ করে।

         ৩. Best Practices (সেরা নিয়ম):
            - যদি আপনি চান স্পেস (Space) গণনা হবে না, তবে .trim() বা Regex ব্যবহার করে স্পেস বাদ দিয়ে কাউন্ট করা উচিত। (যেমন: inp.value.replace(/\s/g, "").length)
            - বড় টেক্সট এরিয়ার ক্ষেত্রে পারফরম্যান্স ঠিক রাখতে 'Debouncing' ব্যবহার করা যেতে পারে।

         ৪. Thumb-up Rules:
            - পাসওয়ার্ড ফিল্ডের স্ট্রেন্থ চেক বা টুইটার-এর মতো ক্যারেক্টার লিমিট তৈরির জন্য এই লজিকটি আদর্শ।
            - রিয়েল-টাইম ফিডব্যাক দেওয়ার জন্য সবসময় 'input' ইভেন্টকে প্রাধান্য দিন।

         ৫. Additional Info (Word Counter logic):
            - যদি শব্দের সংখ্যা (Word Count) বের করতে চান, তবে ভ্যালুটিকে স্পেস দিয়ে স্প্লিট করতে পারেন: inp.value.trim().split(/\s+/).length;

         ৬. Expected Output Flow:
            - পেজ লোড হবে -> কাউন্টার "0" দেখাবে।
            - ইউজার ইনপুট বক্সে "Hello" লিখবে।
            - সাথে সাথে <span> এর লেখা পরিবর্তন হয়ে "5" হয়ে যাবে।
            - ইউজার একটি ক্যারেক্টার মুছলে কাউন্টার কমে "4" হবে।
      */
    </script>
  </body>
</html>
