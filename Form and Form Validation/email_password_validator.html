<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Password Validator</title>

    <style>
      :root {
        --accent-hover: #2563eb;
        --accent: #3b82f6;
        --bg: #0b0d10;
        --border: #252c35;
        --card: #12161b;
        --danger: #ef4444;
        --input: #171c22;
        --muted: #a7b0ba;
        --radius: 12px;
        --success: #22c55e;
        --text: #f3f5f7;
        --warning: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: "Artifakt Element", "Segoe UI", sans-serif;
        color: var(--text);
      }

      .container {
        width: 100%;
        max-width: 420px;
        padding: 28px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
      }

      h1 {
        font-size: 1.6rem;
        margin-bottom: 24px;
        font-weight: 600;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      input {
        width: 100%;
        height: 48px;
        padding: 0 14px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--input);
        color: var(--text);
        font-family: inherit;
        outline: none;
        transition: 0.2s;
      }

      input:focus {
        border-color: var(--accent);
      }

      .password-wrapper {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
      }

      .feedback {
        font-size: 0.85rem;
        margin-top: 6px;
        color: var(--danger);
      }

      button.submit-btn {
        width: 100%;
        height: 48px;
        border: none;
        border-radius: var(--radius);
        background: var(--accent);
        color: white;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }

      button.submit-btn:hover {
        background: var(--accent-hover);
      }

      #validationResult {
        margin-top: 20px;
        padding: 12px;
        border-radius: var(--radius);
        text-align: center;
        font-weight: 600;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Email & Password Validator</h1>

      <form id="form" novalidate>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="example@email.com" />
          <p class="feedback" id="emailFeedback">
            Please enter a valid email address
          </p>
        </div>

        <div class="form-group">
          <label>Password</label>

          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter password" />
            <button type="button" class="toggle-password" id="togglePassword">
              👁
            </button>
          </div>

          <p class="feedback" id="passwordFeedback">
            Password must be at least 8 characters long
          </p>
        </div>

        <button class="submit-btn" type="submit">Validate</button>
      </form>

      <div id="validationResult"></div>
    </div>
    <script>
      /* 
         ১. এলিমেন্ট সিলেকশন (Element Selection):
         DOM থেকে প্রয়োজনীয় ফর্ম, ইনপুট এবং ফিডব্যাক এলিমেন্টগুলোকে ভেরিয়েবলে রাখা হচ্ছে।
         এটি কোডকে ক্লিন রাখে এবং বারবার DOM কুয়েরি করা থেকে বাঁচায়।
      */
      let form = document.querySelector("form"); // মূল ফর্ম এলিমেন্ট
      let password = document.querySelector("#password"); // পাসওয়ার্ড ইনপুট ফিল্ড
      let email = document.querySelector("#email"); // ইমেইল ইনপুট ফিল্ড
      let emailFeedback = document.querySelector("#emailFeedback"); // ইমেইল এরর মেসেজ
      let passwordFeedback = document.querySelector("#passwordFeedback"); // পাসওয়ার্ড এরর মেসেজ
      let validationResult = document.querySelector("#validationResult"); // ফাইনাল রেজাল্ট বক্স
      let togglePassword = document.querySelector("#togglePassword"); // পাসওয়ার্ড শো/হাইড বাটন

      /* 
         ২. ডিফল্ট স্টেট (Default State):
         পেজ লোড হওয়ার সময় এরর মেসেজগুলো লুকিয়ে রাখা হচ্ছে।
      */
      emailFeedback.style.display = "none"; // Output: ইমেইল এরর হাইড হবে
      passwordFeedback.style.display = "none"; // Output: পাসওয়ার্ড এরর হাইড হবে

      /* 
         ৩. পাসওয়ার্ড টগল লজিক (Show/Hide Password):
         ইউজার চোখের আইকনে ক্লিক করলে পাসওয়ার্ডের টাইপ 'password' থেকে 'text' এ পরিবর্তন হবে।
      */
      togglePassword.addEventListener("click", () => {
        /* বর্তমান টাইপ চেক করে বিপরীত টাইপ সেট করা হচ্ছে (Ternary Operator ব্যবহার করে) */
        const type = password.getAttribute("type") === "password" ? "text" : "password";
        password.setAttribute("type", type); // Output: ইনপুট টাইপ পরিবর্তন হবে
        /* আইকন পরিবর্তন করা হচ্ছে */
        togglePassword.textContent = type === "password" ? "👁" : "🙈"; // Output: আইকন পরিবর্তন হবে
      });

      /* 
         ৪. ফর্ম সাবমিট ইভেন্ট (Form Validation Logic):
         সাবমিট বাটনে ক্লিক করলে পুরো ভ্যালিডেশন প্রসেস শুরু হবে।
      */
      form.addEventListener("submit", (e) => {
        /* ব্রাউজারের ডিফল্ট পেজ রিফ্রেশ বন্ধ করা হচ্ছে */
        e.preventDefault(); // Output: পেজ রিফ্রেশ হবে না

        /* ইনপুট থেকে ভ্যালু নিয়ে দুই পাশের অপ্রয়োজনীয় স্পেস (Trim) বাদ দেওয়া হচ্ছে */
        const emailValue = email.value.trim();
        const passwordValue = password.value.trim();

        /* ইমেইল ফরম্যাট চেক করার জন্য রেগুলার এক্সপ্রেশন (Regex) */
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        /* ভ্যালিডেশন কন্ডিশন চেক */
        let isEmailValid = emailRegex.test(emailValue); // Output: true/false
        let isPasswordValid = passwordValue.length >= 8; // Output: true/false

        /* ৫. ইমেইল ভ্যালিডেশন UI আপডেট: */
        if (!isEmailValid) {
          emailFeedback.style.display = "block"; // এরর মেসেজ দেখানো
          email.style.borderColor = "var(--danger)"; // বর্ডার লাল করা
        } else {
          emailFeedback.style.display = "none"; // এরর মেসেজ লুকানো
          email.style.borderColor = "var(--success)"; // বর্ডার সবুজ করা
        }

        /* ৬. পাসওয়ার্ড ভ্যালিডেশন UI আপডেট: */
        if (!isPasswordValid) {
          passwordFeedback.style.display = "block"; // এরর মেসেজ দেখানো
          password.style.borderColor = "var(--danger)"; // বর্ডার লাল করা
        } else {
          passwordFeedback.style.display = "none"; // এরর মেসেজ লুকানো
          password.style.borderColor = "var(--success)"; // বর্ডার সবুজ করা
        }

        /* ৭. ফাইনাল রেজাল্ট প্রদর্শন: */
        validationResult.style.display = "block";
        if (isEmailValid && isPasswordValid) {
          /* সব ঠিক থাকলে সাকসেস মেসেজ */
          validationResult.textContent = "Form submitted successfully! 🎉";
          validationResult.style.backgroundColor = "rgba(34, 197, 94, 0.2)";
          validationResult.style.color = "var(--success)";
          validationResult.style.border = "1px solid var(--success)";
          
          /* ৩ সেকেন্ড পর ফর্ম রিসেট এবং মেসেজ হাইড করা (Best Practice) */
          setTimeout(() => {
            form.reset(); // ইনপুট ফিল্ড খালি করা
            email.style.borderColor = "var(--border)";
            password.style.borderColor = "var(--border)";
            validationResult.style.display = "none";
          }, 3000);
        } else {
          /* ভুল থাকলে এরর মেসেজ */
          validationResult.textContent = "Please fix the errors above.";
          validationResult.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
          validationResult.style.color = "var(--danger)";
          validationResult.style.border = "1px solid var(--danger)";
        }
      });

      /* 
         ---------------------------------------------------------
         Study Notes & Best Practices:
         ---------------------------------------------------------
         ১. কেন .trim() ব্যবহার করবেন? 
            - ইউজার অনেক সময় ভুল করে শুরুতে বা শেষে স্পেস দিয়ে ফেলে, যা ভ্যালিডেশনে সমস্যা করে।
         ২. Common Mistakes: 
            - পাসওয়ার্ডের টাইপ 'text' করার পর আবার 'password' এ ফিরিয়ে না আনা।
            - e.preventDefault() দিতে ভুলে যাওয়া, যার ফলে এরর মেসেজ দেখার আগেই পেজ রিফ্রেশ হয়ে যায়।
         ৩. Thumb-up Rules: 
            - পাসওয়ার্ড ফিল্ডে সবসময় কমপক্ষে ৮টি ক্যারেক্টার এবং স্পেশাল ক্যারেক্টার চেক করা সিকিউরিটির জন্য ভালো।
            - ভিজ্যুয়াল ফিডব্যাক (বর্ডার কালার চেঞ্জ) ইউজার এক্সপেরিয়েন্স (UX) উন্নত করে।
      */
    </script>
    </script>
  </body>
</html>
