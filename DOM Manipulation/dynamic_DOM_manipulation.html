<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic DOM Manipulation</title>
  </head>
  <body>
    <script>
      /* 
           ১. document.createElement(tagName):
           নতুন একটি HTML এলিমেন্ট মেমরিতে তৈরি করার জন্য এটি ব্যবহৃত হয়। 
           এটি সরাসরি ব্রাউজারে দেখা যায় না যতক্ষণ না আমরা এটিকে DOM ট্রিতে যুক্ত করি।
        */
      const newDiv = document.createElement("div");
      const newPara = document.createElement("p");

      /* 
           ২. এলিমেন্টে কন্টেন্ট এবং স্টাইল যোগ করা:
           তৈরি করা এলিমেন্টটিকে সাজানোর জন্য আমরা textContent বা innerHTML ব্যবহার করি।
        */
      newDiv.textContent = "I am a new Container";
      newPara.innerText = "I am a paragraph inside the container.";
      newDiv.style.border = "2px solid red"; // স্টাইল যোগ করা হলো চেনার জন্য

      /* 
           ৩. appendChild(node):
           এটি একটি প্যারেন্ট এলিমেন্টের একদম শেষে একটি চাইল্ড নোড যুক্ত করে। 
           এখানে আমরা বডির ভেতরে নতুন ডিভটি এবং ডিভের ভেতরে প্যারাগ্রাফটি ঢোকাচ্ছি।
        */
      document.body.appendChild(newDiv); // বডির শেষে div যুক্ত হলো
      newDiv.appendChild(newPara); // div এর ভেতরে p যুক্ত হলো

      /* 
           ৪. append(...nodes or strings):
           এটি appendChild এর আধুনিক ভার্সন। এটি দিয়ে একসাথে একাধিক এলিমেন্ট 
           এমনকি সরাসরি টেক্সটও যোগ করা যায়। এটি কোনো রিটার্ন ভ্যালু দেয় না।
        */
      const span1 = document.createElement("span");
      span1.textContent = "Span 1 ";
      newDiv.append(span1, "Direct Text Added!"); // এলিমেন্ট এবং টেক্সট একসাথে যোগ হলো

      /* 
           ৫. prepend(node or string):
           এটি append এর উল্টো। এটি প্যারেন্ট এলিমেন্টের একদম শুরুতে (সবার আগে) 
           নতুন কন্টেন্ট বা এলিমেন্ট যুক্ত করে।
        */
      const heading = document.createElement("h2");
      heading.textContent = "Dynamic Header";
      newDiv.prepend(heading); // এটি div এর সবার উপরে চলে যাবে

      /* 
           ৬. insertBefore(newNode, referenceNode):
           যদি আমরা কোনো নির্দিষ্ট এলিমেন্টের ঠিক আগে কিছু বসাতে চাই, তবে এটি ব্যবহার করি।
           প্যারেন্ট এলিমেন্টের ওপর এটি কল করতে হয়।
        */
      const boldText = document.createElement("b");
      boldText.textContent = " [Important Note] ";
      newDiv.insertBefore(boldText, newPara); // newPara এর ঠিক আগে boldText বসবে

      /* 
           ৭. removeChild(node):
           প্যারেন্ট এলিমেন্ট থেকে নির্দিষ্ট একটি চাইল্ডকে সরিয়ে ফেলার জন্য এটি ব্যবহৃত হয়। 
           এটি সরানো এলিমেন্টটিকে রিটার্ন করে, যা পরে আবার ব্যবহার করা সম্ভব।
        */
      const removedElement = newDiv.removeChild(span1);
      console.log(removedElement.textContent); // Output: Span 1

      /* 
           ৮. remove():
           এটি আধুনিক এবং সহজ পদ্ধতি। কোনো এলিমেন্টকে সরাসরি ডিলিট করতে এটি ব্যবহৃত হয়। 
           এটির জন্য প্যারেন্ট এলিমেন্টের রেফারেন্স লাগে না।
        */
      // heading.remove(); // এটি কল করলে 'Dynamic Header' টি মুছে যাবে

      /* 
           ৯. replaceChild(newChild, oldChild):
           একটি পুরনো এলিমেন্ট সরিয়ে সেখানে নতুন একটি এলিমেন্ট বসাতে এটি ব্যবহৃত হয়।
        */
      const newLink = document.createElement("a");
      newLink.href = "#";
      newLink.textContent = " Click Me (Replaced)";
      newDiv.replaceChild(newLink, boldText); // boldText এর জায়গায় link চলে আসবে

      /* 
           ১০. cloneNode(deep):
           বিদ্যমান কোনো এলিমেন্টের হুবহু কপি তৈরি করতে এটি ব্যবহৃত হয়। 
           deep parameter 'true' হলে ভেতরের সব চাইল্ডসহ কপি হয়, 'false' হলে শুধু ট্যাগটি কপি হয়।
        */
      const clonedDiv = newDiv.cloneNode(true); // পুরো ডিভটি কপি হলো
      document.body.appendChild(clonedDiv); // কপির কপি বডিতে যোগ হলো

      /* 
           ১১. insertAdjacentHTML(position, text):
           এটি অত্যন্ত শক্তিশালী। এটি স্ট্রিং হিসেবে থাকা HTML কে নির্দিষ্ট পজিশনে ইনসার্ট করে।
           পজিশনগুলো হলো: 'beforebegin', 'afterbegin', 'beforeend', 'afterend'.
        */
      newDiv.insertAdjacentHTML(
        "afterend",
        "<p>Created via insertAdjacentHTML</p>",
      );

      /* 
           ---------------------------------------------------------
           সারাংশ ও বেস্ট প্র্যাকটিস (Study Notes):
           ---------------------------------------------------------
           
           * appendChild vs append:
             - appendChild শুধু একটি 'Node' নেয় এবং সেই নোডটি রিটার্ন করে।
             - append একাধিক নোড এবং 'String' ও নিতে পারে, কিন্তু কিছু রিটার্ন করে না।
             - আধুনিক প্রজেক্টে 'append' বেশি সুবিধাজনক।

           * innerHTML vs createElement:
             - innerHTML ব্যবহার করা সহজ কিন্তু এটি সিকিউরিটি রিস্ক (XSS Attack) তৈরি করতে পারে।
             - createElement অনেক বেশি নিরাপদ এবং পারফরম্যান্সের দিক থেকে বড় অ্যাপ্লিকেশনে ভালো।
             - যখন অনেক বেশি লুপ চালিয়ে এলিমেন্ট বানাতে হয়, তখন 'DocumentFragment' ব্যবহার করা বেস্ট প্র্যাকটিস।

           * DocumentFragment (অতিরিক্ত তথ্য):
             - এটি একটি অদৃশ্য কন্টেইনার। অনেকগুলো এলিমেন্ট প্রথমে এতে যোগ করে শেষে একবার DOM এ পুশ করলে 
               ব্রাউজারের রি-রেন্ডারিং কম হয় এবং পেজ ফাস্ট থাকে।

           * কমন মিস্টেক (Common Mistakes):
             - appendChild বা insertBefore করার সময় প্যারেন্ট এলিমেন্ট ঠিকমতো সিলেক্ট না করা।
             - removeChild ব্যবহার করার সময় ভুল চাইল্ড রেফারেন্স দেওয়া (যা ওই প্যারেন্টের অধীনে নেই)।
             - cloneNode(false) ব্যবহার করে আশা করা যে ভেতরের লেখাও কপি হবে (আসলে হবে না)।

           * থাম্ব-রুল (Thumb Rule):
             - যদি শুধু টেক্সট যোগ করতে হয়, তবে textContent ব্যবহার করুন।
             - যদি নতুন এলিমেন্ট বানাতে হয়, তবে createElement ব্যবহার করুন।
             - যদি পুরো একটি HTML ব্লক স্ট্রিং থেকে ঢোকাতে হয়, তবে insertAdjacentHTML ব্যবহার করুন।

           * আউটপুট চেক করার উপায়:
             - ব্রাউজারের 'Inspect Element' বা 'Elements' ট্যাবে গিয়ে দেখুন কিভাবে স্ট্রাকচারটি পরিবর্তন হচ্ছে।
        */

      // Expected Outputs in Console/DOM:
      // console.log(newDiv.children.length); // Output: 3 (h2, a, p)
      // console.log(document.body.innerHTML); // Output: HTML structure with dynamic elements
    </script>
  </body>
</html>
