<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice Problem 01</title>
  </head>
  <body>
    <h1 id="page-heading">Welcome Developers</h1>
    <button id="update-btn">Update Heading</button>

    <script>
      /* 
         ১. এলিমেন্ট সিলেকশন (querySelector):
         document.querySelector ব্যবহার করে আমরা ID (#) দিয়ে h1 এলিমেন্টটিকে সিলেক্ট করছি।
         এটি একটি অবজেক্ট রিটার্ন করে যা আমরা 'h1' ভেরিয়েবলে রাখছি।
         কেন করছি: যাতে পরবর্তীতে জাভাস্ক্রিপ্ট দিয়ে এই হেডিংয়ের লেখা বা স্টাইল পরিবর্তন করা যায়।
      */
      let h1 = document.querySelector("#page-heading");

      /* 
         ২. বাটন সিলেকশন:
         একইভাবে আপডেট বাটনটিকে সিলেক্ট করা হচ্ছে যাতে আমরা এতে একটি ক্লিক ইভেন্ট যোগ করতে পারি।
         কেন করছি: ইউজার যখন বাটনে ক্লিক করবে, তখন যেন ব্রাউজার বুঝতে পারে কোন বাটনে অ্যাকশন নিতে হবে।
      */
      let updateBtn = document.querySelector("#update-btn");

      /* 
         ৩. ইভেন্ট লিসেনার (addEventListener):
         আমরা বাটনের ওপর একটি 'click' ইভেন্ট লিসেনার বসাচ্ছি। 
         এটি মূলত ব্রাউজারকে বলে দেয় যে, যখনই এই বাটনে ক্লিক করা হবে, তখনই যেন নির্দিষ্ট কাজটি করা হয়।
      */
      updateBtn.addEventListener("click", () => {
        
        /* 
           ৪. কনসোল লগ (Debugging):
           বাটনটি ঠিকমতো কাজ করছে কি না তা নিশ্চিত হওয়ার জন্য আমরা কনসোলে একটি মেসেজ প্রিন্ট করছি।
           কেন করছি: কোড রান করার সময় কোনো সমস্যা হলে কনসোল দেখে বোঝা যায় ক্লিক ইভেন্টটি ট্রিগার হয়েছে কি না।
        */
        console.log("Clicking");

        /* 
           ৫. টেক্সট পরিবর্তন (textContent):
           h1 এলিমেন্টের ভেতরের টেক্সট পরিবর্তন করে নতুন একটি স্ট্রিং সেট করা হচ্ছে।
           কেন করছি: ইউজারের ইন্টারঅ্যাকশনের (ক্লিক) ওপর ভিত্তি করে পেজের কন্টেন্ট ডাইনামিকভাবে আপডেট করার জন্য।
           নোট: textContent ব্যবহার করা নিরাপদ এবং দ্রুত কারণ এটি শুধু টেক্সট নিয়ে কাজ করে।
        */
        h1.textContent = "Welcome to Sheryians!";
      });

      /* 
         সারাংশ: এই কোডটি একটি বাটনে ক্লিক করলে একটি হেডিংয়ের লেখা পরিবর্তন করে দেয়। 
         এটি DOM ম্যানিপুলেশনের একটি প্রাথমিক এবং গুরুত্বপূর্ণ উদাহরণ।
      */
    </script>
  </body>
</html>
